<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiBooks - Koleksi Buku Terbesar & Terlengkap</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#A86E43',
                        secondary: '#E0E0E0',
                        accent: '#F5F5F5',
                    },
                    fontFamily: {
                        outfit: ['Outfit', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #E0E0E0;
        }
        .glass-nav {
            background: rgba(224, 224, 224, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        .nav-link {
            position: relative;
            padding-bottom: 2px;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -2px;
            left: 50%;
            background-color: #A86E43;
            transition: all 0.3s ease-in-out;
            transform: translateX(-50%);
        }
        .nav-link:hover::after {
            width: 100%;
        }
        .hero-gradient {
            background: radial-gradient(circle at top right, rgba(168, 110, 67, 0.05), transparent);
        }
        .floating-sticker {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
    </style>
</head>
<body class="text-slate-800 antialiased overflow-x-hidden">

    <!-- Navbar -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass-nav">
        <div class="container mx-auto px-6 py-4 flex items-center justify-between">
            <!-- Left: Logo -->
            <div class="flex items-center">
                <a href="#" id="logo" class="text-2xl font-bold text-primary tracking-tight">LiBooks</a>
            </div>

            <!-- Middle: Navigation -->
            <div class="hidden md:flex items-center space-x-8">
                <a href="#" class="nav-link font-medium hover:text-primary transition-colors">Beranda</a>
                <a href="#" class="nav-link font-medium hover:text-primary transition-colors">Kategory</a>
                <a href="#" class="nav-link font-medium hover:text-primary transition-colors">Terbaru</a>
            </div>

            <!-- Right: Auth -->
            <div class="flex items-center space-x-4">
                <a href="#" class="nav-link font-semibold text-slate-700 hover:text-primary transition-colors">Login</a>
                <a href="#" class="bg-primary text-white px-6 py-2 rounded-full font-semibold hover:bg-opacity-90 transition-all shadow-lg shadow-primary/20">Sign Up</a>
            </div>
            
            <!-- Mobile Menu Toggle (Optional but good for responsiveness) -->
            <div class="md:hidden">
                <button id="menu-btn" class="text-slate-800">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="relative min-h-screen flex items-center pt-24 hero-gradient">
        <div class="container mx-auto px-[70px] grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
            
            <!-- Left Column: Content -->
            <div class="order-2 lg:order-1 space-y-8">
                <div class="space-y-4">
                    <h1 class="text-6xl md:text-8xl font-bold text-primary leading-tight">
                        The LiBooks,
                    </h1>
                    <p class="text-lg md:text-xl text-slate-600 max-w-lg leading-relaxed">
                        Browse from the largest collection of books. Read stories from anywhere, at anytime.
                    </p>
                </div>

                <!-- Search Box -->
                <div class="flex flex-col sm:flex-row items-center bg-white p-2 rounded-2xl shadow-xl max-w-xl group focus-within:ring-2 focus-within:ring-primary/20 transition-all">
                    <div class="flex-grow flex items-center px-4 w-full">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                        <input type="text" placeholder="Cari judul atau penulis buku" class="w-full py-3 outline-none text-slate-700 bg-transparent" id="search-input">
                    </div>
                    <button class="bg-primary text-white px-10 py-3 rounded-xl font-bold w-full sm:w-auto hover:bg-opacity-90 transition-all active:scale-95 shadow-md shadow-primary/30">
                        Jelajah
                    </button>
                </div>

                <!-- Social Proof / Decorative -->
                <div class="flex items-center space-x-4 pt-4">
                    <div class="flex -space-x-3">
                        <div class="w-10 h-10 rounded-full border-2 border-secondary bg-slate-300 flex items-center justify-center">
                            <svg class="w-6 h-6 text-slate-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path></svg>
                        </div>
                        <div class="w-10 h-10 rounded-full border-2 border-secondary bg-slate-400 flex items-center justify-center">
                            <svg class="w-6 h-6 text-slate-600" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path></svg>
                        </div>
                        <div class="w-10 h-10 rounded-full border-2 border-secondary bg-slate-500 flex items-center justify-center">
                            <svg class="w-6 h-6 text-slate-200" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path></svg>
                        </div>
                    </div>
                    <p class="text-sm text-slate-500 font-medium">Bergabung dengan 10k+ pembaca aktif</p>
                </div>
            </div>

            <!-- Right Column: Visual -->
            <div class="order-1 lg:order-2 relative flex justify-center items-center">
                <!-- Abstract Background Ornament -->
                <div class="absolute w-[120%] h-[120%] bg-primary/5 rounded-full blur-3xl -z-10"></div>
                
                <!-- Main Image -->
                <div class="relative w-full max-w-lg">
                    <img src="hero.png" alt="LiBooks Hero" class="w-full h-auto drop-shadow-2xl rounded-3xl transform -rotate-2 hover:rotate-0 transition-transform duration-500">
                    
                    <!-- Floating Ornaments (Stickers) -->
                    <div class="absolute -top-10 -right-10 bg-white p-4 rounded-2xl shadow-xl floating-sticker" style="animation-delay: 0s;">
                        <span class="text-2xl">📚</span>
                    </div>
                    <div class="absolute -bottom-10 -left-10 bg-white p-4 rounded-2xl shadow-xl floating-sticker" style="animation-delay: 2s;">
                        <span class="text-2xl">✨</span>
                    </div>
                    <div class="absolute top-1/2 -left-16 bg-white p-4 rounded-2xl shadow-xl floating-sticker hidden md:block" style="animation-delay: 4s;">
                        <div class="flex items-center space-x-2">
                            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                            <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Baru Rilis</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </section>

</body>
</html>
